name: Deploy to MonsterASP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: Frontend/portfolio-angular/package-lock.json

    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: Frontend/portfolio-angular

    - name: Build Angular Frontend
      run: npm run build -- --configuration production
      working-directory: Frontend/portfolio-angular

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Publish ASP.NET Core WebAPI
      run: dotnet publish src/Portfolio.WebAPI/Portfolio.WebAPI.csproj -c Release -o ./publish

    - name: FTP Deploy to MonsterASP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: site76428.siteasp.net
        username: site76428
        password: ${{ secrets.FTP_PASSWORD || 'Alok@123' }}
        local-dir: ./publish/
        server-dir: /
        dangerous-clean-slate: false
