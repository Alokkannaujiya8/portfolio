<div class="profile-container">
  <!-- PAGE HEADER -->
  <div class="profile-header-section">
    <div class="page-title-row">
      <mat-icon class="page-icon">person</mat-icon>
      <h1 class="page-title">Profile Settings</h1>
    </div>
    <div class="breadcrumbs">
      <a routerLink="/admin/dashboard" class="breadcrumb-link">Dashboard</a>
      <span class="separator">/</span>
      <span class="current">Profile</span>
    </div>
  </div>

  @if (isLoading()) {
    <mat-progress-bar mode="indeterminate" class="mb-4"></mat-progress-bar>
  }

  <div class="profile-card">
    <mat-tab-group>
      <!-- Hero Banner Tab -->
      <mat-tab label="Hero Banner">
        <form [formGroup]="heroForm" (ngSubmit)="onSaveHero()" class="tab-form">
          <mat-form-field appearance="outline">
            <mat-label>Title</mat-label>
            <input matInput formControlName="title" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Subtitle</mat-label>
            <input matInput formControlName="subtitle" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Profile Image Relative Path</mat-label>
            <input matInput formControlName="imageUrl" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Resume Link / URL</mat-label>
            <input matInput formControlName="resumeUrl" />
          </mat-form-field>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Primary Button Text</mat-label>
              <input matInput formControlName="primaryButtonText" />
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Secondary Button Text</mat-label>
              <input matInput formControlName="secondaryButtonText" />
            </mat-form-field>
          </div>

          <button mat-flat-button color="primary" type="submit" [disabled]="heroForm.invalid || isLoading()" class="save-btn">
            Save Hero Configuration
          </button>
        </form>
      </mat-tab>

      <!-- About Me Biography Tab -->
      <mat-tab label="About Me">
        <form [formGroup]="aboutForm" (ngSubmit)="onSaveAbout()" class="tab-form">
          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Title</mat-label>
              <input matInput formControlName="title" />
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Subtitle</mat-label>
              <input matInput formControlName="subtitle" />
            </mat-form-field>
          </div>

          <mat-form-field appearance="outline">
            <mat-label>Description Biography</mat-label>
            <textarea matInput formControlName="description" rows="5"></textarea>
          </mat-form-field>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Location</mat-label>
              <input matInput formControlName="location" />
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Email Address</mat-label>
              <input matInput type="email" formControlName="email" />
            </mat-form-field>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Phone Number</mat-label>
              <input matInput formControlName="phone" />
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Years of Experience</mat-label>
              <input matInput type="number" formControlName="experienceYears" />
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Projects Completed</mat-label>
              <input matInput type="number" formControlName="projectsCompleted" />
            </mat-form-field>
          </div>

          <button mat-flat-button color="primary" type="submit" [disabled]="aboutForm.invalid || isLoading()" class="save-btn">
            Save About Biography
          </button>
        </form>
      </mat-tab>
    </mat-tab-group>
  </div>
</div>
